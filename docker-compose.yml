version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: socialgraph-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: socialgraph_atlas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: socialgraph-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialgraph-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/socialgraph_atlas?schema=public
      - PORT=3000
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
