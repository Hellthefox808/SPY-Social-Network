<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Cyber Gradients -->
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" rx="40" fill="url(#bg-grad)" />

  <g transform="translate(400, 400)">
    <!-- Outer Orbiting Rings -->
    <circle cx="0" cy="0" r="300" fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="10 15" />
    <circle cx="0" cy="0" r="230" fill="none" stroke="url(#primary-grad)" stroke-width="1.5" opacity="0.3" />
    <circle cx="0" cy="0" r="160" fill="none" stroke="#1e293b" stroke-width="2" />
    
    <!-- Globe Grid Lines (Latitudes/Longitudes) -->
    <path d="M -230 0 A 230 110 0 0 0 230 0" fill="none" stroke="url(#primary-grad)" stroke-width="2" opacity="0.25" />
    <path d="M -230 0 A 230 110 0 0 1 230 0" fill="none" stroke="url(#primary-grad)" stroke-width="2" opacity="0.25" />
    <path d="M 0 -230 A 110 230 0 0 0 0 230" fill="none" stroke="url(#primary-grad)" stroke-width="2" opacity="0.25" />
    <path d="M 0 -230 A 110 230 0 0 1 0 230" fill="none" stroke="url(#primary-grad)" stroke-width="2" opacity="0.25" />

    <!-- Connection Paths -->
    <path d="M -150 -100 L -50 50 L 120 -80 L 180 100 L 0 180 L -150 -100" fill="none" stroke="url(#primary-grad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    <path d="M -50 50 L 0 -150 L 120 -80" fill="none" stroke="url(#accent-grad)" stroke-width="2" stroke-dasharray="5 5" />
    
    <!-- Central Node Cluster -->
    <!-- Nodes (Outer Ring) -->
    <circle cx="-150" cy="-100" r="18" fill="url(#primary-grad)" filter="url(#glow)" />
    <circle cx="-150" cy="-100" r="8" fill="#f8fafc" />
    
    <circle cx="-50" cy="50" r="14" fill="#8b5cf6" />
    
    <circle cx="120" cy="-80" r="20" fill="url(#accent-grad)" filter="url(#glow)" />
    <circle cx="120" cy="-80" r="8" fill="#f8fafc" />

    <circle cx="180" cy="100" r="16" fill="url(#primary-grad)" />

    <circle cx="0" cy="180" r="22" fill="#1e293b" stroke="url(#primary-grad)" stroke-width="3" />
    <circle cx="0" cy="180" r="8" fill="url(#primary-grad)" />
    
    <circle cx="0" cy="-150" r="14" fill="url(#accent-grad)" />

    <!-- Stylized Compass Arrow (Geo Indicator) -->
    <polygon points="0,-35 15,10 0,0 -15,10" fill="url(#accent-grad)" transform="translate(120, -80) rotate(45)" filter="url(#glow)" />
    <polygon points="0,-25 10,7 0,0 -10,7" fill="#f8fafc" transform="translate(120, -80) rotate(45)" />

    <!-- Pulse Animation Ring around Confidence Node -->
    <circle cx="120" cy="-80" r="35" fill="none" stroke="url(#accent-grad)" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="20;50" dur="3s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.8;0" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
