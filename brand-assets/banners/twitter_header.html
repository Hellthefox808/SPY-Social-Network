<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SocialGraph Atlas - Twitter / X Header Banner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
    }
  </style>
</head>
<body class="p-6 flex flex-col items-center justify-center min-h-screen">

  <div class="w-full max-w-4xl flex items-center justify-between mb-4">
    <h1 class="text-xl font-bold text-white">Twitter / X Header Banner (1500x500)</h1>
    <span class="text-xs text-slate-500 uppercase tracking-widest">Dimension Guard: 3:1 Ratio</span>
  </div>

  <!-- TWITTER BANNER CANVAS -->
  <div class="w-[600px] h-[200px] rounded-xl relative overflow-hidden bg-[#020617] border border-slate-800 flex items-center justify-between p-8 select-none shadow-2xl">
    <!-- Map grid overlay -->
    <div class="absolute inset-0 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:14px_14px] opacity-20"></div>
    <!-- Neon spotlights -->
    <div class="absolute left-0 bottom-0 w-44 h-44 bg-blue-500/10 blur-[50px] rounded-full pointer-events-none"></div>
    <div class="absolute right-0 top-0 w-44 h-44 bg-violet-500/10 blur-[50px] rounded-full pointer-events-none"></div>

    <!-- Content -->
    <div class="space-y-4 z-10 w-full">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2.5">
          <!-- Small stylized icon -->
          <svg class="h-8 w-8 text-blue-500" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="40" stroke="currentColor" stroke-width="4" />
            <path d="M30 40 L50 65 L70 35 L50 45 Z" fill="none" stroke="#8b5cf6" stroke-width="3" />
            <circle cx="30" cy="40" r="5" fill="#8b5cf6" />
            <circle cx="50" cy="65" r="5" fill="#10b981" />
            <circle cx="70" cy="35" r="5" fill="#3b82f6" />
          </svg>
          <div>
            <h2 class="text-base font-extrabold tracking-widest text-white uppercase leading-none">SocialGraph <span class="text-blue-400">Atlas</span></h2>
            <p class="text-[7px] uppercase tracking-[0.3em] text-slate-500 mt-0.5">Local-First OSINT Intelligence</p>
          </div>
        </div>
        <div class="text-[8px] text-slate-400 font-mono tracking-wider border border-slate-800 rounded bg-[#0a0d16] px-2 py-0.5">
          STABLE_BUILD: v1.2
        </div>
      </div>

      <div class="border-t border-slate-900 pt-3 flex items-center justify-between">
        <div class="space-y-1">
          <p class="text-xs font-semibold text-slate-200 tracking-wide">Mapping Geographic Overlaps &amp; Profiles</p>
          <p class="text-[9px] text-slate-400 max-w-[340px]">
            Spring force node layouts, Nominatim geo resolvers, and secure sqlite traceability database.
          </p>
        </div>
        
        <!-- Graph nodes preview right -->
        <div class="flex gap-2">
          <div class="w-10 h-10 rounded border border-slate-800/80 bg-slate-950 flex flex-col justify-between p-1.5 text-center">
            <span class="text-[6px] text-slate-500 uppercase">GH</span>
            <span class="text-[8px] font-bold text-blue-400">95%</span>
          </div>
          <div class="w-10 h-10 rounded border border-slate-800/80 bg-slate-950 flex flex-col justify-between p-1.5 text-center">
            <span class="text-[6px] text-slate-500 uppercase">RD</span>
            <span class="text-[8px] font-bold text-violet-400">90%</span>
          </div>
          <div class="w-10 h-10 rounded border border-slate-800/80 bg-slate-950 flex flex-col justify-between p-1.5 text-center">
            <span class="text-[6px] text-slate-500 uppercase">WEB</span>
            <span class="text-[8px] font-bold text-emerald-400">75%</span>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
